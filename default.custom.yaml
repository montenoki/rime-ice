patch:
  # __include: rime_ice_suggestion:/

  schema_list:
    - schema: rime_ice

  switcher/fold_options: false

  switches:
    - name: ascii_mode
      reset: 1
      states: ["中文", "西文"]

  key_binder/bindings/+:
    - { when: paging, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }
